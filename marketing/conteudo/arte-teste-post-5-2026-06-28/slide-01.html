<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publi AI - Post 5 Slide 01</title>
  <style>
    :root {
      --blue: #1868FF;
      --blue-dark: #0052CC;
      --ink: #0D1117;
      --graphite: #2B2F36;
      --muted: #A7A9AC;
      --paper: #F4F5F2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      font-family: "Exo 2", "Avenir Next", "Montserrat", "Segoe UI", Arial, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 14%, rgba(24, 104, 255, 0.09), transparent 28%),
        radial-gradient(circle at 84% 82%, rgba(0, 82, 204, 0.08), transparent 30%),
        linear-gradient(180deg, #fbfbf8 0%, var(--paper) 100%);
      color: var(--ink);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.24;
      background-image:
        linear-gradient(rgba(13, 17, 23, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(13, 17, 23, 0.018) 1px, transparent 1px);
      background-size: 18px 18px;
      pointer-events: none;
    }

    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.28;
      background-image:
        radial-gradient(rgba(13, 17, 23, 0.13) 0.7px, transparent 0.8px);
      background-size: 19px 23px;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .topbar {
      position: absolute;
      z-index: 2;
      top: 86px;
      left: 82px;
      right: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 218px;
      height: 58px;
      border-radius: 16px;
      background: var(--ink);
      box-shadow: 0 18px 50px rgba(13, 17, 23, 0.12);
    }

    .logo {
      width: 164px;
      height: auto;
      display: block;
    }

    .tag {
      color: var(--graphite);
      font-size: 19px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .quote-mark {
      position: absolute;
      z-index: 1;
      top: 178px;
      left: 90px;
      color: var(--ink);
      font-size: 130px;
      line-height: 0.8;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .content {
      position: absolute;
      z-index: 2;
      left: 86px;
      right: 86px;
      top: 414px;
      text-align: left;
    }

    .headline {
      margin: 0;
      color: var(--ink);
      font-size: 76px;
      line-height: 0.98;
      font-weight: 400;
      letter-spacing: 0;
    }

    .headline strong {
      font-weight: 900;
    }

    .headline .blue {
      color: var(--blue);
      font-weight: 900;
    }

    .headline .underlined {
      position: relative;
      display: inline-block;
      font-weight: 900;
      white-space: nowrap;
    }

    .headline .underlined::after {
      content: "";
      position: absolute;
      left: -0.03em;
      right: -0.04em;
      bottom: 0.02em;
      height: 0.09em;
      background: rgba(24, 104, 255, 0.24);
      border-bottom: 5px solid var(--blue);
      z-index: -1;
    }

    .divider {
      width: 118px;
      height: 7px;
      margin: 66px 0 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--blue-dark));
    }

    .support {
      width: 710px;
      margin: 34px 0 0;
      color: var(--graphite);
      font-size: 28px;
      line-height: 1.34;
      font-weight: 500;
    }

    .footer {
      position: absolute;
      z-index: 2;
      left: 86px;
      right: 86px;
      bottom: 82px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .cta {
      color: var(--ink);
      font-size: 25px;
      line-height: 1.1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .cta span {
      display: block;
      margin-top: 10px;
      color: var(--blue);
      font-size: 22px;
      font-weight: 800;
      text-transform: none;
    }

    .seal {
      width: 74px;
      height: 74px;
      border: 2px solid rgba(13, 17, 23, 0.22);
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.54);
    }

    .seal img {
      width: 45px;
      height: 45px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <header class="topbar">
      <div class="brand-pill">
        <img class="logo" src="../../../identidade/logo-publiai-horizontal.png" alt="Publi AI Solucoes">
      </div>
      <div class="tag">Landing pages · CRM</div>
    </header>

    <div class="quote-mark">“</div>

    <section class="content" aria-label="Mensagem principal">
      <h1 class="headline">
        Uma <strong>landing page bonita</strong><br>
        pode até gerar <span class="blue">contatos.</span><br><br>
        Mas só uma <span class="underlined">estrutura comercial</span><br>
        ajuda a não perder oportunidades.
      </h1>
      <div class="divider"></div>
      <p class="support">
        Captação, CRM e notificações trabalhando juntos para o lead não se perder no caminho.
      </p>
    </section>

    <footer class="footer">
      <div class="cta">
        Quer ver na prática?
        <span>Envie DEMO no direct</span>
      </div>
      <div class="seal">
        <img src="../../../identidade/logo-publiai-icone.png" alt="">
      </div>
    </footer>
  </main>
</body>
</html>
